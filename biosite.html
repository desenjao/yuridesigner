<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    
    <!-- TÍTULO OTIMIZADO -->
    <title>Yuri Santos | Edição de Vídeo Profissional</title>
    <meta name="description" content="Designer especializado em edição de vídeos para eventos e marcas com trilha sonora estratégica.">
    
    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- ÍCONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Remove highlight ao tocar */
        }

        :root {
            /* Tema Dark (padrão) */
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --accent: #FFD700;
            --accent-gradient: linear-gradient(135deg, #A58BD4, #FFD700);
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --border-radius: 12px;
        }

        /* Tema Light */
        [data-theme="light"] {
            --bg-primary: #F5F5F7;
            --bg-secondary: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #424245;
            --accent: #FFD700;
            --accent-gradient: linear-gradient(135deg, #FFD700, #A58BD4);
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        html, body {
            background-color: var(--bg-primary);
            width: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
            /* Melhora performance de scroll */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none; /* Remove o efeito de "fisgamento" */
        }

        /* ===== WELCOME SCREEN (LIQUID GLASS) ===== */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background-color: rgba(0, 0, 0, 0.3);
            transition: opacity 0.5s ease, visibility 0.5s ease; /* Reduzido tempo */
            will-change: opacity, visibility; /* Otimiza animação */
        }

        [data-theme="light"] .welcome-screen {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: glassAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            will-change: transform, opacity; /* Otimiza animação */
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            gap: 4px;
            box-shadow: 0 4px 15px var(--shadow-color);
            /* Garante que não atrapalhe scroll */
            pointer-events: auto;
        }

        /* ===== FUNDO DINÂMICO (OTIMIZADO) ===== */
        .particles-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            /* Background fallback para mobile */
            background: radial-gradient(circle at 50% 50%, rgba(165,139,212,0.05), transparent 70%);
        }

        /* Versão estática para mobile (melhor performance) */
        @media (max-width: 768px) {
            .particles-background {
                background: radial-gradient(circle at 50% 50%, rgba(165,139,212,0.03), transparent 70%);
            }
            
            /* Desativa partículas animadas no mobile */
            .particle {
                display: none;
            }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
            /* Remove transição para evitar recálculos */
            transition: none;
            /* Otimiza renderização */
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        /* ===== LAYOUT PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-md);
            /* Melhora performance de scroll */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ===== HERO TOP ===== */
        .hero {
            width: 100%;
            height: 65vh;
            max-height: 650px;
            min-height: 450px;
            position: relative;
            clip-path: ellipse(150% 100% at 50% 0%);
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 30px var(--shadow-color);
            /* Otimiza renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            /* Remove transição que pode causar lag */
            transition: none;
            /* Otimiza renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ===== INTRO & SCROLL INDICATOR ===== */
        .intro {
            width: 100%;
            text-align: center;
            padding: var(--spacing-md) var(--spacing-sm);
            animation: fadeInUp 0.8s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 30vh;
            justify-content: space-between;
        }

        .scroll-indicator {
            position: relative;
            margin-top: 25px;
            color: var(--text-primary);
            animation: bounce 2s infinite;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            /* Otimiza animação */
            will-change: transform;
            backface-visibility: hidden;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); } /* Reduzido para menos movimento */
            60% { transform: translateY(-4px); } /* Reduzido para menos movimento */
        }

        /* ===== GRID DE BOTÕES ===== */
        .buttons-grid {
            width: 95%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: var(--spacing-md) 0;
        }

        .btn-card {
            width: 100%;
            text-decoration: none;
            display: block;
            transition: transform 0.3s ease; /* Transição mais leve */
            border: none !important;
            background: transparent !important;
            overflow: visible !important;
            /* Otimiza renderização */
            will-change: transform;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .btn-card img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 8px 12px var(--shadow-color));
            transition: filter 0.3s ease; /* Transição mais leve */
            /* Otimiza renderização */
            backface-visibility: hidden;
        }

        .btn-card:hover {
            transform: translateY(-4px) scale(1.01); /* Reduzido para menos movimento */
        }

        .btn-card:active {
            transform: translateY(-2px) scale(0.99);
        }

        /* ===== CTA & SOCIAL ===== */
        .cta-section {
            width: 100%;
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            background: linear-gradient(to bottom, transparent, rgba(165, 139, 212, 0.1));
            border-radius: 30px 30px 0 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .social-links a {
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s; /* Transição mais rápida */
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            /* Otimiza renderização */
            will-change: transform;
            backface-visibility: hidden;
        }

        .social-links a:active {
            transform: scale(0.95); /* Feedback de toque */
        }

        /* ===== HERO BOTTOM ===== */
        .hero-bottom {
            width: 100%;
            height: 45vh;
            margin-top: -10px;
            border-radius: 30px 30px 0 0;
            overflow: hidden;
            position: relative;
            background-color: var(--bg-primary);
            /* Otimiza renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .hero-bottom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            /* Otimiza renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* ===== WHATSAPP FLOAT & MODAL ===== */
        .whatsapp-float {
            position: fixed;
            width: 60px; /* Reduzido ligeiramente */
            height: 60px; /* Reduzido ligeiramente */
            bottom: 20px;
            right: 20px;
            background: var(--accent-gradient);
            border-radius: 50%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            /* Otimiza animação */
            will-change: transform;
            backface-visibility: hidden;
        }

        .whatsapp-icon { 
            width: 30px; 
            height: 30px; 
            fill: white; 
        }

        /* Remove animação pulse no mobile para melhor performance */
        @media (max-width: 768px) {
            .whatsapp-float {
                animation: none;
            }
        }

        .wpp-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .wpp-modal-content {
            background: linear-gradient(135deg, #111, #000);
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            padding: var(--spacing-lg);
            border: 1px solid rgba(165, 139, 212, 0.3);
            /* Otimiza renderização */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .wpp-modal-body button {
            width: 100%;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: 0.2s; /* Transição mais rápida */
            font-size: 0.95rem;
            /* Otimiza renderização */
            -webkit-tap-highlight-color: rgba(165, 139, 212, 0.3);
        }

        .wpp-modal-body button:active {
            background: var(--accent-gradient);
            transform: translateX(3px); /* Reduzido */
            color: white;
        }

        @keyframes glassAppear {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(15px); /* Reduzido */
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); } /* Reduzido */
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVIDADE ===== */
        @media screen and (min-width: 768px) {
            .container { max-width: 700px; }
            .buttons-grid { max-width: 500px; }
            h1 { font-size: 3rem; }
        }

        /* Modo de acessibilidade - reduz movimento */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
            
            .particle {
                display: none;
            }
            
            .particles-background {
                background: radial-gradient(circle at 50% 50%, rgba(165,139,212,0.05), transparent 70%);
            }
        }

        /* Remove atraso em elementos com backdrop-filter */
        @supports (-webkit-backdrop-filter: none) or (backdrop-filter: none) {
            .glass-card, .theme-toggle, .social-links a, .wpp-modal {
                -webkit-backdrop-filter: blur(10px);
                backdrop-filter: blur(10px);
            }
        }
    </style>
</head>

    <script>
        // ===== THEME MANAGEMENT =====
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            
            // Update active buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-theme') === theme) {
                    btn.classList.add('active');
                }
            });

            // Save preference
            localStorage.setItem('theme', theme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // ===== WELCOME SCREEN =====
        function hideWelcomeScreen(animate = true) {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const glassCard = document.getElementById('glassCard');
            
            if (animate) {
                glassCard.style.transition = 'opacity 0.3s ease, transform 0.3s ease'; // Reduzido
                glassCard.style.opacity = '0';
                glassCard.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    welcomeScreen.classList.add('hidden');
                }, 300); // Reduzido
            } else {
                welcomeScreen.classList.add('hidden');
            }
        }

        // Auto-hide after 2 seconds (reduzido)
        setTimeout(() => {
            hideWelcomeScreen(true);
        }, 2000);

        // Hide on button click
        document.getElementById('exploreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            hideWelcomeScreen(true);
        });

        // Hide on ESC key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const welcomeScreen = document.getElementById('welcomeScreen');
                if (!welcomeScreen.classList.contains('hidden')) {
                    hideWelcomeScreen(true);
                }
            }
        });

        // ===== FUNDO DINÂMICO COM PARTÍCULAS (OTIMIZADO) =====
        function createParticles() {
            const container = document.getElementById('particles');
            const motionMediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
            const isMobile = window.innerWidth < 768;
            
            // Não cria partículas em mobile para melhor performance
            if (motionMediaQuery.matches || isMobile) {
                return;
            }
            
            const numberOfParticles = 25; // Reduzido para 25
            container.innerHTML = '';
            
            for (let i = 0; i < numberOfParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 30 + 5; // Reduzido tamanho máximo
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                const layer = Math.floor(Math.random() * 3) + 1;
                particle.classList.add(`particle-layer-${layer}`);
                
                particle.style.opacity = 0.2 + Math.random() * 0.3; // Reduzido opacidade
                
                container.appendChild(particle);
            }
        }

        // ===== ANIMAÇÃO DAS PARTÍCULAS (OTIMIZADA) =====
        function animateParticles() {
            const motionMediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
            const isMobile = window.innerWidth < 768;
            
            // Não anima em mobile ou se usuário prefere reduzir movimento
            if (motionMediaQuery.matches || isMobile) return;
            
            const particles = document.querySelectorAll('.particle');
            if (particles.length === 0) return;
            
            let scrollY = 0;
            let ticking = false;
            
            window.addEventListener('scroll', function() {
                scrollY = window.scrollY;
                
                if (!ticking) {
                    window.requestAnimationFrame(function() {
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        const scrollProgress = maxScroll > 0 ? scrollY / maxScroll : 0;
                        
                        particles.forEach(particle => {
                            const speed = 0.2; // Velocidade fixa para consistência
                            const moveY = scrollProgress * 100 * speed;
                            particle.style.transform = `translateY(${moveY}px)`;
                        });
                        
                        ticking = false;
                    });
                    
                    ticking = true;
                }
            }, { passive: true }); // Importante: passive melhora performance de scroll
        }

        // ===== WHATSAPP FUNCTIONS =====
        const phoneNumber = "5589981264127";

        function toggleWppModal() {
            const modal = document.getElementById("wppModal");
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
            }
        }

        function sendWppMsg(message) {
            const encodedMsg = encodeURIComponent(message);
            const url = `https://wa.me/${phoneNumber}?text=${encodedMsg}`;
            window.open(url, '_blank');
            toggleWppModal();
        }

        // ===== FECHA MODAL AO CLICAR FORA =====
        window.onclick = function(event) {
            const modal = document.getElementById("wppModal");
            if (event.target == modal) {
                toggleWppModal();
            }
        }

        // ===== FECHA MODAL COM TECLA ESC =====
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById("wppModal");
                if (modal.style.display === "flex") {
                    toggleWppModal();
                }
            }
        });

        // ===== INICIALIZAÇÃO OTIMIZADA =====
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            animateParticles();
        });

        // ===== REVELAR ELEMENTOS COM SCROLL (OTIMIZADO) =====
        // Usa Intersection Observer com thresholds menores para performance
        const observerOptions = {
            threshold: 0.05, // Reduzido
            rootMargin: '0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                    // Para de observar após revelar
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.btn-card, .cta-section, .hero-bottom').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)'; // Reduzido
            el.style.transition = 'opacity 0.4s ease, transform 0.4s ease'; // Reduzido
            observer.observe(el);
        });

        // ===== PREVINE COMPORTAMENTO PADRÃO DE TOQUE =====
        document.addEventListener('touchmove', function(e) {
            // Permite scroll normal sem interferência
        }, { passive: true });
    </script>
</body>
</html>
