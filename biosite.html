<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <!-- TÍTULO OTIMIZADO -->
    <title>Yuri Santos | Edição de Vídeo Profissional</title>
    <meta name="description" content="Designer especializado em edição de vídeos para eventos e marcas com trilha sonora estratégica.">
    
    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- ÍCONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ===== RESET E VARIÁVEIS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Tema Dark (padrão) */
            --bg-primary: #0A0A0A;
            --bg-secondary: #111111;
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --accent: #A58BD4;
            --accent-gradient: linear-gradient(135deg, #A58BD4, #7B68B5);
            --card-bg: rgba(255, 255, 255, 0.08);
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --border-radius: 12px;
        }

        /* Tema Light */
        [data-theme="light"] {
            --bg-primary: #F5F5F7;
            --bg-secondary: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #424245;
            --accent: #7B68B5;
            --accent-gradient: linear-gradient(135deg, #7B68B5, #A58BD4);
            --card-bg: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        html, body {
            background-color: var(--bg-primary);
            width: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* ===== WELCOME SCREEN (LIQUID GLASS) ===== */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            background-color: rgba(0, 0, 0, 0.3);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] .welcome-screen {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            animation: glassAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        [data-theme="light"] .glass-card {
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2),
                        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, transparent 70%);
            opacity: 0.3;
            animation: rotate 20s linear infinite;
        }

        .glass-card h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #FFFFFF, #E0E0E0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        [data-theme="light"] .glass-card h1 {
            background: linear-gradient(135deg, #1D1D1F, #424245);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .glass-card .explore-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(123, 104, 181, 0.3);
        }

        .glass-card .explore-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 28px rgba(123, 104, 181, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-card .explore-btn:active {
            transform: scale(0.98);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            gap: 4px;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .theme-toggle button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .theme-toggle button.active {
            background: var(--accent-gradient);
            color: white;
        }

        /* ===== FUNDO DINÂMICO ===== */
        .particles-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(1px);
            transition: transform 0.1s ease-out;
        }

        .particle-layer-1 { background: rgba(165, 139, 212, 0.1); filter: blur(3px); }
        .particle-layer-2 { background: rgba(255, 255, 255, 0.1); filter: blur(2px); }
        .particle-layer-3 { background: rgba(165, 139, 212, 0.2); filter: blur(1px); }

        [data-theme="light"] .particle-layer-1 { background: rgba(123, 104, 181, 0.1); }
        [data-theme="light"] .particle-layer-2 { background: rgba(0, 0, 0, 0.05); }
        [data-theme="light"] .particle-layer-3 { background: rgba(123, 104, 181, 0.15); }

        /* ===== LAYOUT PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-md);
        }

        /* ===== HERO TOP ===== */
        .hero {
            width: 100%;
            height: 65vh;
            max-height: 650px;
            min-height: 450px;
            position: relative;
            clip-path: ellipse(150% 100% at 50% 0%);
            overflow: hidden;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: transform 0.3s ease;
        }

        /* ===== INTRO & SCROLL INDICATOR ===== */
        .intro {
            width: 100%;
            text-align: center;
            padding: var(--spacing-md) var(--spacing-sm);
            animation: fadeInUp 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 30vh;
            justify-content: space-between;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .description {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 400px;
        }

        .scroll-indicator {
            position: relative;
            margin-top: 25px;
            color: var(--text-primary);
            animation: bounce 2s infinite;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* ===== GRID DE BOTÕES ===== */
        .buttons-grid {
            width: 95%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: var(--spacing-md) 0;
        }

        .btn-card {
            width: 100%;
            text-decoration: none;
            display: block;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: none !important;
            background: transparent !important;
            overflow: visible !important; 
        }

        .btn-card img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 8px 12px var(--shadow-color));
            transition: transform 0.5s ease;
        }

        .btn-card:hover {
            transform: translateY(-6px) scale(1.02);
        }

        .btn-card:hover img {
            filter: drop-shadow(0 12px 20px rgba(165, 139, 212, 0.4));
        }

        /* ===== CTA & SOCIAL ===== */
        .cta-section {
            width: 100%;
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            background: linear-gradient(to bottom, transparent, rgba(165, 139, 212, 0.1));
            border-radius: 30px 30px 0 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .social-links a {
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
        }

        .social-links a:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            transform: translateY(-3px);
            color: white;
        }

        /* ===== HERO BOTTOM ===== */
        .hero-bottom {
            width: 100%;
            height: 45vh;
            margin-top: -10px;
            border-radius: 30px 30px 0 0;
            overflow: hidden;
            position: relative;
            background-color: var(--bg-primary);
        }

        .hero-bottom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* ===== WHATSAPP FLOAT & MODAL ===== */
        .whatsapp-float {
            position: fixed;
            width: 65px;
            height: 65px;
            bottom: 25px;
            right: 25px;
            background: var(--accent-gradient);
            border-radius: 50%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .whatsapp-icon { width: 32px; height: 32px; fill: white; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(165, 139, 212, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(165, 139, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(165, 139, 212, 0); }
        }

        .wpp-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .wpp-modal-content {
            background: linear-gradient(135deg, #111, #000);
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            padding: var(--spacing-lg);
            border: 1px solid rgba(165, 139, 212, 0.3);
        }

        [data-theme="light"] .wpp-modal-content {
            background: linear-gradient(135deg, #fff, #f5f5f7);
            border: 1px solid rgba(123, 104, 181, 0.3);
        }

        [data-theme="light"] .wpp-modal-content h3 {
            color: #1D1D1F;
        }

        .wpp-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .close-modal {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close-modal:hover {
            color: white;
        }

        [data-theme="light"] .close-modal:hover {
            color: #1D1D1F;
        }

        .wpp-modal-body button {
            width: 100%;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .wpp-modal-body button:hover {
            background: var(--accent-gradient);
            transform: translateX(5px);
            color: white;
        }

        @keyframes glassAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== RESPONSIVIDADE ===== */
        @media screen and (min-width: 768px) {
            .container { max-width: 700px; }
            .buttons-grid { max-width: 500px; }
            h1 { font-size: 3rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .particle, .glass-card, .welcome-screen {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

    <script>
        // ===== THEME MANAGEMENT =====
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            
            // Update active buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-theme') === theme) {
                    btn.classList.add('active');
                }
            });

            // Save preference
            localStorage.setItem('theme', theme);
        }

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // ===== WELCOME SCREEN =====
        function hideWelcomeScreen(animate = true) {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const glassCard = document.getElementById('glassCard');
            
            if (animate) {
                glassCard.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                glassCard.style.opacity = '0';
                glassCard.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    welcomeScreen.classList.add('hidden');
                }, 400);
            } else {
                welcomeScreen.classList.add('hidden');
            }
        }

        // Auto-hide after 2.5 seconds
        setTimeout(() => {
            hideWelcomeScreen(true);
        }, 2500);

        // Hide on button click
        document.getElementById('exploreBtn').addEventListener('click', function(e) {
            e.preventDefault();
            hideWelcomeScreen(true);
        });

        // Hide on ESC key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const welcomeScreen = document.getElementById('welcomeScreen');
                if (!welcomeScreen.classList.contains('hidden')) {
                    hideWelcomeScreen(true);
                }
            }
        });

        // ===== FUNDO DINÂMICO COM PARTÍCULAS =====
        function createParticles() {
            const container = document.getElementById('particles');
            const motionMediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
            
            if (motionMediaQuery.matches) {
                // Criar fundo estático com menos partículas
                container.style.background = 'radial-gradient(circle at 50% 50%, rgba(165,139,212,0.1), transparent 70%)';
                return;
            }
            
            const numberOfParticles = window.innerWidth < 768 ? 30 : 50;
            container.innerHTML = '';
            
            for (let i = 0; i < numberOfParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 45 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                const speed = 0.2 + Math.random() * 0.5;
                particle.dataset.speed = speed;
                
                const layer = Math.floor(Math.random() * 3) + 1;
                particle.classList.add(`particle-layer-${layer}`);
                particle.dataset.layer = layer;
                
                particle.style.opacity = 0.3 + Math.random() * 0.5;
                
                container.appendChild(particle);
            }
        }

        // ===== ANIMAÇÃO DAS PARTÍCULAS COM SCROLL =====
        function animateParticles() {
            const motionMediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (motionMediaQuery.matches) return;
            
            const particles = document.querySelectorAll('.particle');
            const scrollY = window.scrollY;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            const scrollProgress = maxScroll > 0 ? scrollY / maxScroll : 0;
            
            particles.forEach(particle => {
                const speed = parseFloat(particle.dataset.speed) || 0.3;
                const layer = parseInt(particle.dataset.layer) || 1;
                
                let moveY = scrollProgress * 200 * speed * (layer / 2);
                particle.style.transform = `translateY(${moveY}px)`;
            });
            
            requestAnimationFrame(animateParticles);
        }

        // ===== WHATSAPP FUNCTIONS =====
        const phoneNumber = "5589999767984";

        function toggleWppModal() {
            const modal = document.getElementById("wppModal");
            if (modal.style.display === "flex") {
                modal.style.display = "none";
            } else {
                modal.style.display = "flex";
            }
        }

        function sendWppMsg(message) {
            const encodedMsg = encodeURIComponent(message);
            const url = `https://wa.me/${phoneNumber}?text=${encodedMsg}`;
            window.open(url, '_blank');
            toggleWppModal();
        }

        // ===== FECHA MODAL AO CLICAR FORA =====
        window.onclick = function(event) {
            const modal = document.getElementById("wppModal");
            if (event.target == modal) {
                toggleWppModal();
            }
        }

        // ===== FECHA MODAL COM TECLA ESC =====
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById("wppModal");
                if (modal.style.display === "flex") {
                    toggleWppModal();
                }
            }
        });

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            animateParticles();
        });

        // ===== REVELAR ELEMENTOS COM SCROLL =====
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.btn-card, .cta-section, .hero-bottom').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(el);
        });
    </script>
</body>
</html>
