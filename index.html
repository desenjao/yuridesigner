<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuri Santos | Experiência Cinematográfica</title>
    <link rel="icon" href="img/IMG-20260215-WA0102.jpg" type="image/png">    
    
    <!-- FONTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #0A0A0A;
        }

        /* ===== FUNDO CINEMATOGRÁFICO ===== */
        .cinematic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Camada de partículas */
        .particles-loading {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle-load {
            position: absolute;
            background: rgba(165, 139, 212, 0.15);
            border-radius: 50%;
            filter: blur(2px);
            animation: floatLiquid 12s infinite ease-in-out;
        }

        /* Efeito de gradiente líquido */
        .liquid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(165, 139, 212, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(123, 104, 181, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 20%, rgba(165, 139, 212, 0.1) 0%, transparent 30%);
            filter: blur(20px);
            animation: liquidMove 20s infinite alternate;
            z-index: 2;
        }

        /* Efeito de vinheta */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 3;
            pointer-events: none;
        }

        @keyframes floatLiquid {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            33% { 
                transform: translate(2%, -2%) scale(1.1);
                opacity: 0.5;
            }
            66% { 
                transform: translate(-1%, 3%) scale(0.9);
                opacity: 0.2;
            }
        }

        @keyframes liquidMove {
            0% { transform: scale(1) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.2) rotate(2deg); opacity: 0.8; }
            100% { transform: scale(1) rotate(-2deg); opacity: 0.5; }
        }

        /* ===== CARD LIQUID GLASS ===== */
        .loading-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 480px;
            width: 90%;
            padding: 50px 40px;
            background: rgba(20, 20, 30, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 48px;
            box-shadow: 
                0 30px 60px -20px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset,
                0 0 40px rgba(165, 139, 212, 0.3);
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        /* Reflexo líquido no card */
        .loading-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.3) 0%, transparent 60%);
            opacity: 0.4;
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        /* Brilho líquido nas bordas */
        .loading-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                rgba(165, 139, 212, 0.5), 
                rgba(255, 255, 255, 0.3), 
                rgba(123, 104, 181, 0.5), 
                rgba(165, 139, 212, 0.5));
            border-radius: 50px;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
            filter: blur(5px);
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; filter: blur(5px); }
            50% { opacity: 0.7; filter: blur(8px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #E0E0E0, #A58BD4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 5;
            text-shadow: 0 0 30px rgba(165, 139, 212, 0.5);
        }

        .subtitle-load {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
            position: relative;
            z-index: 5;
            text-transform: uppercase;
        }

        /* Barra de progresso líquida */
        .liquid-progress {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin: 30px 0 20px;
            overflow: hidden;
            position: relative;
            z-index: 5;
            box-shadow: 0 0 20px rgba(165, 139, 212, 0.2);
        }

        .liquid-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, 
                #A58BD4, 
                #7B68B5, 
                #A58BD4,
                #7B68B5,
                #A58BD4
            );
            background-size: 300% 100%;
            border-radius: 4px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: liquidShimmer 3s infinite linear;
            position: relative;
            box-shadow: 0 0 15px #A58BD4;
        }

        .liquid-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.4), 
                transparent
            );
            animation: liquidReflection 1.5s infinite;
        }

        @keyframes liquidShimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes liquidReflection {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
            100% { transform: translateX(200%); }
        }

        /* Status líquido */
        .loading-status {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            font-weight: 300;
            margin: 15px 0;
            position: relative;
            z-index: 5;
            letter-spacing: 0.5px;
        }

        .loading-status span {
            color: #A58BD4;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(165, 139, 212, 0.5);
        }

        /* Bolhas líquidas para contador */
        .bubble-counter {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0 15px;
            position: relative;
            z-index: 5;
        }

        .bubble {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 0 10px transparent;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .bubble.loaded {
            background: #A58BD4;
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.3);
            box-shadow: 0 0 20px #A58BD4;
        }

        .bubble.loaded::before {
            opacity: 1;
        }

        /* Mensagem final líquida */
        .ready-message {
            color: #FFFFFF;
            margin-top: 25px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.5s;
            font-weight: 400;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(165, 139, 212, 0.15);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(165, 139, 212, 0.3);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .ready-message.show {
            opacity: 1;
        }

        .ready-message i {
            color: #A58BD4;
            animation: checkPulse 1s infinite;
        }

        @keyframes checkPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .redirect-info {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            margin-top: 30px;
            position: relative;
            z-index: 5;
            letter-spacing: 1px;
        }

        /* Porcentagem líquida */
        .percentage-liquid {
            font-size: 1.2rem;
            font-weight: 600;
            color: #A58BD4;
            text-shadow: 0 0 15px rgba(165, 139, 212, 0.5);
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .loading-container { padding: 40px 25px; }
            .bubble { width: 10px; height: 10px; }
        }
    </style>
</head>
<body>
    <!-- Fundo Cinematográfico -->
    <div class="cinematic-bg">
        <div class="particles-loading" id="particles-loading"></div>
        <div class="liquid-overlay"></div>
        <div class="vignette"></div>
    </div>

    <!-- Card Liquid Glass -->
    <div class="loading-container">
        <h1>YURI SANTOS</h1>
        <div class="subtitle-load">Edição Cinematográfica</div>
        
        <!-- Barra de progresso líquida -->
        <div class="liquid-progress">
            <div class="liquid-fill" id="progressBar"></div>
        </div>

        <!-- Porcentagem líquida -->
        <div class="percentage-liquid" id="percentageDisplay">0%</div>

        <!-- Status -->
        <div class="loading-status" id="loadingStatus">
            <span id="loadedCount">0</span>/<span id="totalCount">6</span> frames carregados
        </div>

        <!-- Bolhas líquidas (indicadores) -->
        <div class="bubble-counter" id="bubbleCounter"></div>

        <!-- Mensagem final -->
        <div class="ready-message" id="readyMessage">
            <i class="fas fa-check-circle"></i>
            Experiência pronta
        </div>

        <!-- Info adicional -->
        <div class="redirect-info" id="redirectInfo">
            preparando sua experiência cinematográfica
        </div>
    </div>

    <!-- Ícones (para o check) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        // Lista de imagens
        const imagesToPreload = [
            'img/Arte Cinematográfica Yuri Santos.jpg.jpeg',
            'img/servicos.png',
            'img/2.png',
            'img/3.png',
            'img/4.png',
            'img/fundo.png'
        ];

        // Elementos DOM
        const progressBar = document.getElementById('progressBar');
        const loadedSpan = document.getElementById('loadedCount');
        const totalSpan = document.getElementById('totalCount');
        const readyMessage = document.getElementById('readyMessage');
        const redirectInfo = document.getElementById('redirectInfo');
        const bubbleCounter = document.getElementById('bubbleCounter');
        const percentageDisplay = document.getElementById('percentageDisplay');
        
        // Criar bolhas líquidas
        imagesToPreload.forEach((_, index) => {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.id = `bubble-${index}`;
            bubbleCounter.appendChild(bubble);
        });

        let loadedImages = 0;
        const totalImages = imagesToPreload.length;
        totalSpan.textContent = totalImages;

        function markImageLoaded(index) {
            const bubble = document.getElementById(`bubble-${index}`);
            if (bubble) bubble.classList.add('loaded');
        }

        function preloadImage(src, index) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages++;
                    loadedSpan.textContent = loadedImages;
                    
                    const percentage = (loadedImages / totalImages) * 100;
                    progressBar.style.width = `${percentage}%`;
                    percentageDisplay.textContent = `${Math.round(percentage)}%`;
                    
                    markImageLoaded(index);
                    
                    if (loadedImages === totalImages) {
                        redirectInfo.textContent = 'redirecionando em 1 segundo';
                        readyMessage.classList.add('show');
                        
                        // Redireciona
                        setTimeout(() => {
                            window.location.href = 'biosite.html';
                        }, 1000);
                    } else {
                        redirectInfo.textContent = `processando... ${Math.round(percentage)}%`;
                    }
                    
                    resolve();
                };
                img.onerror = () => {
                    console.error(`Erro: ${src}`);
                    loadedImages++;
                    loadedSpan.textContent = loadedImages;
                    const percentage = (loadedImages / totalImages) * 100;
                    progressBar.style.width = `${percentage}%`;
                    percentageDisplay.textContent = `${Math.round(percentage)}%`;
                    markImageLoaded(index);
                    reject();
                };
            });
        }

        function createParticles() {
            const container = document.getElementById('particles-loading');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-load';
                
                const size = Math.random() * 100 + 30;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            const loadPromises = imagesToPreload.map((src, index) => 
                preloadImage(src, index)
            );
            
            // Fallback
            setTimeout(() => {
                if (loadedImages < totalImages) {
                    window.location.href = 'biosite.html';
                }
            }, 8000);
        });
    </script>
</body>
</html>
